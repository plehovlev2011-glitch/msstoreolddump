<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Скачать изображение</title>
</head>
<body>
    <button id="downloadBtn" style="width: 100%; height: 100vh; font-size: 10vw;">СКАЧыАТЬ 1.PNG</button>

    <script>
        (function() {
            // Ждём полной загрузки Electron
            const init = () => {
                const downloadBtn = document.getElementById('downloadBtn');
                if (!downloadBtn) return;
                
                downloadBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    
                    const filename = '1.png';
                    const url = '1.png';
                    
                    // Способ 1: Electron API
                    if (typeof require !== 'undefined') {
                        try {
                            const electron = require('electron');
                            const { dialog, ipcRenderer } = electron;
                            const win = electron.remote.getCurrentWindow();
                            
                            // Показываем кастомный диалог
                            const result = await dialog.showSaveDialog(win, {
                                title: 'Сохраните приобретённое приложение',
                                defaultPath: filename,
                                buttonLabel: 'Сохранить'
                            });
                            
                            if (!result.canceled && result.filePath) {
                                // Скачиваем и сохраняем
                                win.webContents.downloadURL(url);
                                
                                win.webContents.session.once('will-download', (event, item) => {
                                    item.setSavePath(result.filePath);
                                    
                                    item.once('done', (event, state) => {
                                        if (state === 'completed') {
                                            dialog.showMessageBox(win, {
                                                title: 'Готово',
                                                message: 'Файл успешно сохранён!',
                                                buttons: ['OK']
                                            });
                                        }
                                    });
                                });
                            }
                            return;
                        } catch(err) {
                            console.log('Electron API error:', err);
                        }
                    }
                    
                    // Способ 2: Обычный download атрибут (запасной)
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                });
            };
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
