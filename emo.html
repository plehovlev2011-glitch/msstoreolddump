<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Скачать изображение</title>
</head>
<body>
    <button id="downloadBtn" style="width: 100%; height: 100vh; font-size: 10vw;">СКАЧАТЬ 1.PNG</button>

    <script>
        // Проверяем, запущено ли приложение в Electron/Nativefier
        const isElectron = navigator.userAgent.toLowerCase().indexOf(' electron/') > -1;
        
        const downloadBtn = document.getElementById('downloadBtn');
        
        downloadBtn.addEventListener('click', async () => {
            const filename = '1.png';
            const url = '1.png';
            
            if (isElectron) {
                // Electron/Nativefier: показываем кастомный диалог
                try {
                    const { dialog } = require('electron').remote;
                    
                    const result = await dialog.showSaveDialog({
                        title: 'Сохраните приобретённое приложение',
                        defaultPath: filename,
                        buttonLabel: 'Сохранить'
                    });
                    
                    if (!result.canceled && result.filePath) {
                        const win = require('electron').remote.getCurrentWindow();
                        win.webContents.downloadURL(url);
                        
                        win.webContents.session.once('will-download', (event, item) => {
                            item.setSavePath(result.filePath);
                        });
                    }
                } catch (err) {
                    console.error('Ошибка:', err);
                    // Запасной вариант: обычная ссылка
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename;
                    link.click();
                }
            } else {
                // Обычный браузер: используем стандартный download
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                link.click();
            }
        });
    </script>
</body>
</html>
